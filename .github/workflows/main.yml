name: Deploy to HF Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "aditya87331@gmail.com"
          git config --global user.name "Aditya-Ranjan1234"

          git clone https://huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-v2 hf-space
          rsync -av --delete --exclude='.git' ./ hf-space/

          cd hf-space
          git add .
          git commit -m "Auto deploy from GitHub" || echo "No changes"
          git push https://aditya-ranjan1234:$HF_TOKEN@huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-v2 main
